<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Where To Go? - 랜덤 좌표 생성기</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-bottom: 1px solid #333;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #00d4ff;
        }

        header p {
            font-size: 0.85rem;
            color: #888;
            margin-top: 4px;
        }

        #map {
            flex: 1;
            z-index: 1;
        }

        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        #coords-display {
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            color: #00d4ff;
            backdrop-filter: blur(10px);
            display: none;
            text-align: center;
            min-width: 280px;
        }

        #coords-display .label {
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        #coords-display .coords {
            font-size: 1.1rem;
        }

        #coords-display .links {
            margin-top: 8px;
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        #coords-display .links a {
            color: #00d4ff;
            text-decoration: none;
            font-size: 0.75rem;
            padding: 4px 10px;
            border: 1px solid #333;
            border-radius: 6px;
            transition: all 0.2s;
        }

        #coords-display .links a:hover {
            background: #00d4ff;
            color: #000;
        }

        #generate-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid #00d4ff;
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            font-size: 1.6rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        #generate-btn:hover {
            background: rgba(0, 212, 255, 0.25);
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }

        #generate-btn:active {
            transform: scale(0.95);
        }

        #generate-btn.loading {
            animation: pulse 0.6s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .leaflet-container {
            background: #0a0a0a;
        }

        #panorama-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2000;
            background: #0a0a0a;
            display: none;
            flex-direction: column;
        }

        #panorama-container.active {
            display: flex;
        }

        #panorama-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: rgba(10, 10, 10, 0.95);
            border-bottom: 1px solid #333;
            z-index: 1;
        }

        #panorama-header .info {
            color: #888;
            font-size: 0.85rem;
        }

        #panorama-header .info .location {
            color: #00d4ff;
            font-size: 1rem;
            margin-bottom: 2px;
        }

        #panorama-close {
            background: none;
            border: 1px solid #555;
            color: #e0e0e0;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        #panorama-close:hover {
            background: #333;
            border-color: #00d4ff;
            color: #00d4ff;
        }

        #panorama-viewer {
            flex: 1;
            position: relative;
        }

        #panorama-viewer canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Where To Go?</h1>
        <p>대한민국 어딘가로 떠나보세요</p>
    </header>

    <div id="map"></div>

    <div class="controls">
        <div id="coords-display">
            <div class="label">Your Destination</div>
            <div class="coords" id="coords-text"></div>
            <div class="links">
                <a id="link-naver" href="#" target="_blank">Naver Map</a>
                <a id="link-kakao" href="#" target="_blank">Kakao Map</a>
                <a id="link-google" href="#" target="_blank">Google Maps</a>
            </div>
        </div>
        <button id="generate-btn" title="랜덤 좌표 생성">?</button>
    </div>

    <div id="panorama-container">
        <div id="panorama-header">
            <div class="info">
                <div class="location" id="panorama-location"></div>
                <div id="panorama-coords"></div>
            </div>
            <button id="panorama-close">닫기</button>
        </div>
        <div id="panorama-viewer"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script>
        const map = L.map('map', {
            zoomControl: false,
        }).setView([36.5, 127.5], 7);

        L.control.zoom({ position: 'topright' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            maxZoom: 19,
        }).addTo(map);

        let marker = null;

        const btn = document.getElementById('generate-btn');
        const coordsDisplay = document.getElementById('coords-display');
        const coordsText = document.getElementById('coords-text');
        const linkNaver = document.getElementById('link-naver');
        const linkKakao = document.getElementById('link-kakao');
        const linkGoogle = document.getElementById('link-google');

        const panoramaContainer = document.getElementById('panorama-container');
        const panoramaLocation = document.getElementById('panorama-location');
        const panoramaCoords = document.getElementById('panorama-coords');
        const panoramaClose = document.getElementById('panorama-close');

        let panoScene = null, panoCamera = null, panoRenderer = null, panoAnimId = null;

        function closePanorama() {
            panoramaContainer.classList.remove('active');
            if (panoAnimId) { cancelAnimationFrame(panoAnimId); panoAnimId = null; }
            if (panoRenderer) {
                panoRenderer.dispose();
                const viewerEl = document.getElementById('panorama-viewer');
                viewerEl.innerHTML = '';
                panoRenderer = null;
            }
            panoScene = null;
            panoCamera = null;
        }

        panoramaClose.addEventListener('click', closePanorama);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closePanorama();
        });

        function extractFace(img, index, faceSize) {
            const canvas = document.createElement('canvas');
            canvas.width = faceSize;
            canvas.height = faceSize;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, index * faceSize, 0, faceSize, faceSize, 0, 0, faceSize, faceSize);
            return canvas;
        }

        function initPanorama(panoramaUrl) {
            const viewerEl = document.getElementById('panorama-viewer');
            viewerEl.innerHTML = '';

            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, viewerEl.clientWidth / viewerEl.clientHeight, 0.1, 1000);
            camera.position.set(0, 0, 0);

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(viewerEl.clientWidth, viewerEl.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            viewerEl.appendChild(renderer.domElement);

            panoScene = scene;
            panoCamera = camera;
            panoRenderer = renderer;

            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => {
                const faceSize = img.height;
                // Extract 6 faces from the horizontal strip
                const faceCanvases = [];
                for (let i = 0; i < 6; i++) {
                    faceCanvases.push(extractFace(img, i, faceSize));
                }

                // Naver strip order: left(0), front(1), right(2), back(3), bottom(4), top(5)
                const textures = faceCanvases.map(c => {
                    const tex = new THREE.CanvasTexture(c);
                    tex.colorSpace = THREE.SRGBColorSpace;
                    return tex;
                });

                // Map Naver faces to Three.js BoxGeometry face order:
                // index 0: +X (right)  -> Naver face 2
                // index 1: -X (left)   -> Naver face 0
                // index 2: +Y (top)    -> Naver face 5
                // index 3: -Y (bottom) -> Naver face 4
                // index 4: +Z (front)  -> Naver face 1
                // index 5: -Z (back)   -> Naver face 3
                const materials = [
                    new THREE.MeshBasicMaterial({ map: textures[0], side: THREE.BackSide }), // +X right
                    new THREE.MeshBasicMaterial({ map: textures[2], side: THREE.BackSide }), // -X left
                    new THREE.MeshBasicMaterial({ map: textures[5], side: THREE.BackSide }), // +Y top
                    new THREE.MeshBasicMaterial({ map: textures[4], side: THREE.BackSide }), // -Y bottom
                    new THREE.MeshBasicMaterial({ map: textures[1], side: THREE.BackSide }), // +Z front
                    new THREE.MeshBasicMaterial({ map: textures[3], side: THREE.BackSide }), // -Z back
                ];

                const geometry = new THREE.BoxGeometry(100, 100, 100);
                const cube = new THREE.Mesh(geometry, materials);
                scene.add(cube);

                // Flip UVs so textures render correctly from inside the cube
                const uvAttr = geometry.attributes.uv;
                for (let i = 0; i < uvAttr.count; i++) {
                    uvAttr.setX(i, 1.0 - uvAttr.getX(i));
                }
                uvAttr.needsUpdate = true;

                function animate() {
                    panoAnimId = requestAnimationFrame(animate);
                    renderer.render(scene, camera);
                }
                animate();
            };
            img.src = panoramaUrl;

            // Mouse/touch controls for looking around
            let isDown = false, prevX = 0, prevY = 0;
            let lon = 0, lat = 0;

            function updateCamera() {
                const phi = THREE.MathUtils.degToRad(90 - lat);
                const theta = THREE.MathUtils.degToRad(lon);
                const target = new THREE.Vector3(
                    Math.sin(phi) * Math.cos(theta),
                    Math.cos(phi),
                    Math.sin(phi) * Math.sin(theta)
                );
                camera.lookAt(target);
            }
            updateCamera();

            renderer.domElement.addEventListener('pointerdown', (e) => {
                isDown = true;
                prevX = e.clientX;
                prevY = e.clientY;
            });
            renderer.domElement.addEventListener('pointermove', (e) => {
                if (!isDown) return;
                lon += (prevX - e.clientX) * 0.2;
                lat += (e.clientY - prevY) * 0.2;
                lat = Math.max(-85, Math.min(85, lat));
                prevX = e.clientX;
                prevY = e.clientY;
                updateCamera();
            });
            renderer.domElement.addEventListener('pointerup', () => { isDown = false; });
            renderer.domElement.addEventListener('pointerleave', () => { isDown = false; });

            // Zoom with scroll
            renderer.domElement.addEventListener('wheel', (e) => {
                e.preventDefault();
                camera.fov = Math.max(30, Math.min(100, camera.fov + e.deltaY * 0.05));
                camera.updateProjectionMatrix();
            }, { passive: false });

            // Touch pinch zoom
            let lastPinchDist = 0;
            renderer.domElement.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    lastPinchDist = Math.sqrt(dx * dx + dy * dy);
                }
            });
            renderer.domElement.addEventListener('touchmove', (e) => {
                if (e.touches.length === 2) {
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    camera.fov = Math.max(30, Math.min(100, camera.fov - (dist - lastPinchDist) * 0.1));
                    camera.updateProjectionMatrix();
                    lastPinchDist = dist;
                }
            });

            // Handle resize
            const onResize = () => {
                if (!panoRenderer) return;
                camera.aspect = viewerEl.clientWidth / viewerEl.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(viewerEl.clientWidth, viewerEl.clientHeight);
            };
            window.addEventListener('resize', onResize);
        }

        btn.addEventListener('click', async () => {
            btn.classList.add('loading');

            try {
                const res = await fetch('/api/random');
                const data = await res.json();
                const { lat, lon } = data;

                if (marker) map.removeLayer(marker);

                marker = L.circleMarker([lat, lon], {
                    radius: 10,
                    color: '#00d4ff',
                    fillColor: '#00d4ff',
                    fillOpacity: 0.6,
                    weight: 2,
                }).addTo(map);

                map.flyTo([lat, lon], 13, { duration: 1.5 });

                coordsText.textContent = `${lat}, ${lon}`;
                linkNaver.href = `https://map.naver.com/p/search/${lat},${lon}`;
                linkKakao.href = `https://map.kakao.com/?urlLevel=3&itemId=&q=&srcid=&map_type=TYPE_MAP&map_attribute=ROADMAP&urlX=${lon}&urlY=${lat}`;
                linkGoogle.href = `https://www.google.com/maps?q=${lat},${lon}`;
                coordsDisplay.style.display = 'block';

                // Show panorama if available
                if (data.panorama_url) {
                    panoramaLocation.textContent = data.panorama_description || '위치 정보 없음';
                    panoramaCoords.textContent = `${lat}, ${lon}`;
                    panoramaContainer.classList.add('active');
                    closePanorama();
                    panoramaContainer.classList.add('active');
                    initPanorama(data.panorama_url);
                }
            } catch (err) {
                console.error('Failed to fetch:', err);
            } finally {
                btn.classList.remove('loading');
            }
        });
    </script>
</body>
</html>
