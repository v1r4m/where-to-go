<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Where To Go? - 랜덤 좌표 생성기</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-bottom: 1px solid #333;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #00d4ff;
        }

        header p {
            font-size: 0.85rem;
            color: #888;
            margin-top: 4px;
        }

        #map {
            flex: 1;
            z-index: 1;
        }

        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        #coords-display {
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            color: #00d4ff;
            backdrop-filter: blur(10px);
            display: none;
            text-align: center;
            min-width: 280px;
        }

        #coords-display .label {
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        #coords-display .coords {
            font-size: 1.1rem;
        }

        #coords-display .links {
            margin-top: 8px;
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        #coords-display .links a {
            color: #00d4ff;
            text-decoration: none;
            font-size: 0.75rem;
            padding: 4px 10px;
            border: 1px solid #333;
            border-radius: 6px;
            transition: all 0.2s;
        }

        #coords-display .links a:hover {
            background: #00d4ff;
            color: #000;
        }

        #generate-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid #00d4ff;
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            font-size: 1.6rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        #generate-btn:hover {
            background: rgba(0, 212, 255, 0.25);
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }

        #generate-btn:active {
            transform: scale(0.95);
        }

        #generate-btn.loading {
            animation: pulse 0.6s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .leaflet-container {
            background: #0a0a0a;
        }

        #panorama-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2000;
            background: #0a0a0a;
            display: none;
            flex-direction: column;
        }

        #panorama-container.active {
            display: flex;
        }

        #panorama-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: rgba(10, 10, 10, 0.95);
            border-bottom: 1px solid #333;
            z-index: 1;
        }

        #panorama-header .info {
            color: #888;
            font-size: 0.85rem;
        }

        #panorama-header .info .location {
            color: #00d4ff;
            font-size: 1rem;
            margin-bottom: 2px;
        }

        #panorama-close {
            background: none;
            border: 1px solid #555;
            color: #e0e0e0;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        #panorama-close:hover {
            background: #333;
            border-color: #00d4ff;
            color: #00d4ff;
        }

        #panorama-img-wrapper {
            flex: 1;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #panorama-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        #panorama-loading {
            color: #888;
            font-size: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <header>
        <h1>Where To Go?</h1>
        <p>대한민국 어딘가로 떠나보세요</p>
    </header>

    <div id="map"></div>

    <div class="controls">
        <div id="coords-display">
            <div class="label">Your Destination</div>
            <div class="coords" id="coords-text"></div>
            <div class="links">
                <a id="link-naver" href="#" target="_blank">Naver Map</a>
                <a id="link-kakao" href="#" target="_blank">Kakao Map</a>
                <a id="link-google" href="#" target="_blank">Google Maps</a>
            </div>
        </div>
        <button id="generate-btn" title="랜덤 좌표 생성">?</button>
    </div>

    <div id="panorama-container">
        <div id="panorama-header">
            <div class="info">
                <div class="location" id="panorama-location"></div>
                <div id="panorama-coords"></div>
            </div>
            <button id="panorama-close">닫기</button>
        </div>
        <div id="panorama-img-wrapper">
            <div id="panorama-loading">파노라마 로딩중...</div>
            <img id="panorama-img" alt="Street View Panorama" style="display:none;" />
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {
            zoomControl: false,
        }).setView([36.5, 127.5], 7);

        L.control.zoom({ position: 'topright' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            maxZoom: 19,
        }).addTo(map);

        let marker = null;

        const btn = document.getElementById('generate-btn');
        const coordsDisplay = document.getElementById('coords-display');
        const coordsText = document.getElementById('coords-text');
        const linkNaver = document.getElementById('link-naver');
        const linkKakao = document.getElementById('link-kakao');
        const linkGoogle = document.getElementById('link-google');

        const panoramaContainer = document.getElementById('panorama-container');
        const panoramaImg = document.getElementById('panorama-img');
        const panoramaLoading = document.getElementById('panorama-loading');
        const panoramaLocation = document.getElementById('panorama-location');
        const panoramaCoords = document.getElementById('panorama-coords');
        const panoramaClose = document.getElementById('panorama-close');

        panoramaClose.addEventListener('click', () => {
            panoramaContainer.classList.remove('active');
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') panoramaContainer.classList.remove('active');
        });

        btn.addEventListener('click', async () => {
            btn.classList.add('loading');

            try {
                const res = await fetch('/api/random');
                const data = await res.json();
                const { lat, lon } = data;

                if (marker) map.removeLayer(marker);

                marker = L.circleMarker([lat, lon], {
                    radius: 10,
                    color: '#00d4ff',
                    fillColor: '#00d4ff',
                    fillOpacity: 0.6,
                    weight: 2,
                }).addTo(map);

                map.flyTo([lat, lon], 13, { duration: 1.5 });

                coordsText.textContent = `${lat}, ${lon}`;
                linkNaver.href = `https://map.naver.com/p/search/${lat},${lon}`;
                linkKakao.href = `https://map.kakao.com/?urlLevel=3&itemId=&q=&srcid=&map_type=TYPE_MAP&map_attribute=ROADMAP&urlX=${lon}&urlY=${lat}`;
                linkGoogle.href = `https://www.google.com/maps?q=${lat},${lon}`;
                coordsDisplay.style.display = 'block';

                // Show panorama if available
                if (data.panorama_url) {
                    panoramaImg.style.display = 'none';
                    panoramaLoading.style.display = 'block';
                    panoramaLocation.textContent = data.panorama_description || '위치 정보 없음';
                    panoramaCoords.textContent = `${lat}, ${lon}`;
                    panoramaContainer.classList.add('active');

                    panoramaImg.onload = () => {
                        panoramaLoading.style.display = 'none';
                        panoramaImg.style.display = 'block';
                    };
                    panoramaImg.onerror = () => {
                        panoramaLoading.textContent = '파노라마를 불러올 수 없습니다';
                    };
                    panoramaImg.src = data.panorama_url;
                }
            } catch (err) {
                console.error('Failed to fetch:', err);
            } finally {
                btn.classList.remove('loading');
            }
        });
    </script>
</body>
</html>
